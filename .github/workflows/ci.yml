name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d relay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MIX_ENV: test
      API_KEY_PEPPER: ci-only-pepper

    steps:
      - uses: actions/checkout@v7

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.4.1"
          elixir-version: "1.20.1"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix sobelow --exit
      - run: mix ecto.create
      - run: mix ecto.migrate
      - run: mix test
