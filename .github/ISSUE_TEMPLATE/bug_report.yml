name: Bug report
description: Report a reproducible problem in Relay Orders
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable reproduction.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Relay commit, Elixir, OTP, and PostgreSQL versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
